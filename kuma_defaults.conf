
# kuma_defaults.conf
# ------------------
# Defaults/profiles configuration for kuma-importer.py
#
# Purpose
# -------
# This file lets you define named defaults profiles that can be selected in the
# interactive menu or via --profile when using TXT/manual import modes.
#
# How profiles work
# -----------------
# - Each profile section must be named [profile:ProfileName]
# - In manual entry mode, the selected profile pre-fills prompts
# - In TXT import mode, the selected profile applies the same defaults to every line
# - CSV import remains the most explicit/authoritative mode and does not require profiles
#
# Available options per profile
# -----------------------------
# client                 = Client label used in naming/tagging/grouping
# group                  = Group label used in grouping/tagging
# type                   = Monitor type (usually http)
# interval               = Polling interval in seconds
# maxretries             = Maximum retries before marking down
# retryInterval          = Retry interval in seconds
# method                 = HTTP method (GET, POST, etc.)
# ignore_tls             = true/false
# timeout                = Timeout value (seconds)
# accepted_statuscodes   = Semicolon or comma separated status/ranges (e.g. 200-299;301)
# tags                   = Extra tags separated by comma or semicolon
# notifications          = Notification names separated by comma or semicolon
# status_page            = Optional status page name for best-effort attachment
# public_group           = Optional public group name for best-effort attachment
# keyword                = Optional keyword check for supported monitor modes
# expected_value         = Optional expected value for supported monitor modes
# name                   = Optional default name; usually left blank so the domain becomes the name
#
# -----------------------------------------------------------------------------
# Example profile for CONTOSO (commented out)
# -----------------------------------------------------------------------------
# [profile:CONTOSO]
# client = CONTOSO
# group = CONTOSO
# type = http
# interval = 60
# maxretries = 1
# retryInterval = 60
# method = GET
# ignore_tls = false
# timeout = 48
# accepted_statuscodes = 200-299
# tags = Sector:Internal;Priority:High
# notifications = Teams-CONTOSO;Email-CONTOSO
# status_page = CONTOSO-status
# public_group = Websites
# keyword =
# expected_value =
# name =
#
# -----------------------------------------------------------------------------
# Example profile for Fabrikam (commented out)
# -----------------------------------------------------------------------------
# [profile:Fabrikam]
# client = Fabrikam
# group = Fabrikam
# type = http
# interval = 60
# maxretries = 1
# retryInterval = 60
# method = GET
# ignore_tls = false
# timeout = 48
# accepted_statuscodes = 200-299
# tags = Sector:Association
# notifications = Teams-Fabrikam
# status_page = Fabrikam-status
# public_group = Websites
# keyword =
# expected_value =
# name =
#
# -----------------------------------------------------------------------------
# Example profile for Fabrikam
# -----------------------------------------------------------------------------
[profile:Fabrikam]
# Client label used for grouping/tagging
client = Fabrikam

# Group label used for grouping/tagging
group = Fabrikam

# Monitor type; for website checks use http
type = http

# Polling interval in seconds
interval = 60

# Maximum retries before a check is considered down
maxretries = 1

# Retry interval in seconds
retryInterval = 60

# HTTP method
method = GET

# Whether to ignore TLS/SSL certificate warnings
ignore_tls = false

# Request timeout
timeout = 48

# Accepted status codes/ranges
accepted_statuscodes = 200-299

# Optional additional tags (baseline Client/Group/Source/Service/Environment tags are added automatically)
tags = Priority:Normal

# Optional notification display names defined in Uptime Kuma
notifications =

# Optional status page name for best-effort attachment
status_page =

# Optional public group name for best-effort attachment
public_group =

# Optional keyword/expected value fields for advanced use cases
keyword =
expected_value =

# Optional default name (usually blank so the entered domain becomes the monitor name)
name =
