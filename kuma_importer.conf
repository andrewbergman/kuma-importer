
# kuma_importer.conf
# ------------------
# Main runtime configuration file for kuma_csv_importer_v6.py
#
# Notes
# -----
# - Lines beginning with # or ; are comments.
# - Leave values blank if you prefer to be prompted at runtime.
# - Command-line arguments override these settings.
# - Environment variables (KUMA_URL, KUMA_USERNAME, KUMA_PASSWORD) are also honoured.
#
# Example usage:
#   python kuma_csv_importer_v6.py --interactive
#   python kuma_csv_importer_v6.py --csv example_monitors.csv --dry-run
#
[connection]
# URL of the Uptime Kuma instance.
# Example:
# url = https://uptimekuma.contoso.com
url = https://uptimekuma.contoso.com

# Username for the automation/local Uptime Kuma account.
# Example:
# username = kuma-automation
username = ADMIN

# Password for the automation/local Uptime Kuma account.
# Example:
# password = change_me
password = hunter2

[defaults]
# Default client name used when TXT/manual import auto-detection does not match a known pattern.
# Example:
# default_client = Clients
default_client = Clients

# Default CSV path shown in the interactive menu.
# Uses the included example file for quick testing.
# Example:
# default_csv = example_monitors.csv
default_csv = example_monitors.csv

# Default TXT path shown in the interactive menu.
# Uses the included example file for quick testing.
# Example:
# default_txt = example_domains.txt
default_txt = example_domains.txt

# Default export filename shown in the interactive menu.
# Example:
# default_export = exported_monitors.csv
default_export = exported_monitors.csv

# Whether dry-run should default to yes in the interactive menu.
# Example:
# dry_run_default = true
dry_run_default = true

# Whether verbose output should default to yes in the interactive menu.
# Example:
# verbose_default = false
verbose_default = false
